name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        bun-version: ['1.3.3']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ matrix.bun-version }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Unit tests only
        env:
          # Unit tests should not require live infra; placeholder env keeps config Zod happy
          # if any module still evaluates getConfig() during import.
          DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/ci
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: '6379'
          BETTER_AUTH_SECRET: ci-test-secret-min-32-characters-long
        run: bun test tests/unit

      - name: Build
        env:
          DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/ci
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: '6379'
          BETTER_AUTH_SECRET: ci-test-secret-min-32-characters-long
        run: bun run build
