name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        bun-version: ['1.3.3']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ matrix.bun-version }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Unit tests only
        env:
          # Unit tests should not require live infra; placeholder env keeps config Zod happy
          # if any module still evaluates getConfig() during import.
          DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/ci
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: '6379'
          BETTER_AUTH_SECRET: ci-test-secret-min-32-characters-long
        run: bun test tests/unit

      - name: Build
        env:
          DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/ci
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: '6379'
          BETTER_AUTH_SECRET: ci-test-secret-min-32-characters-long
        run: bun run build

  integration:
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        bun-version: ['1.3.3']
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ matrix.bun-version })

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Migrate database
        env:
          DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/ci
        run: bun run db:migrate

      - name: Apply SQL migrations
        env:
          DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/ci
        run: bun run db:apply-sql

      - name: Hermetic integration tests
        env:
          RUN_INTEGRATION: 1
          DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/ci
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: '6379'
          REDIS_DB: '9'
          QUEUE_REDIS_DB: '9'
          BETTER_AUTH_SECRET: ci-test-secret-min-32-characters-long
        run: bun run test:integration
