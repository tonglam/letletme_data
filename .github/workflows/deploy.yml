name: Deploy

on:
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: ['main']
  workflow_dispatch:
    inputs:
      sha:
        description: >-
          Commit SHA or ref to deploy. Leave empty for current main HEAD;
          pass a previous SHA to roll back.
        required: false
        type: string

# Never cancel a deploy mid-flight: the SSH session runs git reset, migrations
# and compose up as one critical section — interrupting it strands the VPS
# checkout/DB ahead of the running containers.
concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'main'
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      REGISTRY: ghcr.io
    steps:
      - name: Checkout workflow run commit
        if: github.event_name == 'workflow_run'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Checkout manual dispatch ref
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.sha || github.sha }}

      - name: Set deployment metadata
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            DEPLOY_SHA="${{ github.event.workflow_run.head_sha }}"
          else
            # Resolve whatever ref/SHA was dispatched to a full commit SHA so
            # the image tag and the VPS git reset are unambiguous.
            DEPLOY_SHA="$(git rev-parse HEAD)"
          fi
          IMAGE_NAME=$(echo "${REGISTRY}/${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')
          echo "DEPLOY_SHA=${DEPLOY_SHA}" >> $GITHUB_ENV
          echo "IMAGE_NAME=${IMAGE_NAME}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --tag ${IMAGE_NAME}:${DEPLOY_SHA} \
            --tag ${IMAGE_NAME}:latest \
            --push .
          echo "IMAGE_REF=${IMAGE_NAME}:${DEPLOY_SHA}" >> $GITHUB_ENV

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOY_SHA: ${{ env.DEPLOY_SHA }}
          IMAGE_REF: ${{ env.IMAGE_REF }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Expected deployment config:
          # vars.VPS_HOST=43.163.91.9
          # vars.VPS_USER=deploy
          # vars.VPS_WORKDIR=/home/workspace/letletme_data
          # secrets.VPS_SSH_KEY=<private key for deploy>
          VPS_WORKDIR: ${{ vars.VPS_WORKDIR }}
        with:
          host: ${{ vars.VPS_HOST }}
          username: ${{ vars.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          envs: DEPLOY_SHA,IMAGE_REF,GHCR_USER,GHCR_TOKEN,VPS_WORKDIR
          script: |
            set -euo pipefail
            LOWER_USER=$(echo "$GHCR_USER" | tr '[:upper:]' '[:lower:]')
            printf '%s' "$GHCR_TOKEN" | docker login ghcr.io -u "$LOWER_USER" --password-stdin
            cd "$VPS_WORKDIR"
            git fetch --all
            git checkout --force main
            git reset --hard "$DEPLOY_SHA"
            APP_IMAGE="$IMAGE_REF" docker compose pull api worker
            APP_IMAGE="$IMAGE_REF" docker compose run --rm -T api bun run db:migrate
            APP_IMAGE="$IMAGE_REF" docker compose run --rm -T api bun scripts/apply-sql-migrations.ts
            APP_IMAGE="$IMAGE_REF" docker compose up -d --remove-orphans --no-build
            for attempt in $(seq 1 30); do
              if curl --fail --silent http://127.0.0.1/health >/dev/null; then
                break
              fi
              if [ "$attempt" -eq 30 ]; then
                echo "Health check failed after waiting for startup"
                APP_IMAGE="$IMAGE_REF" docker compose ps
                docker logs --tail 100 letletme_data-api-1 || true
                exit 1
              fi
              sleep 2
            done

            # The worker exposes no HTTP port; assert its Docker healthcheck
            # (heartbeat file mtime, see docker-compose.yml) reports healthy.
            WORKER_CID=$(APP_IMAGE="$IMAGE_REF" docker compose ps -q worker)
            if [ -z "$WORKER_CID" ]; then
              echo "Worker container not found after deploy"
              APP_IMAGE="$IMAGE_REF" docker compose ps
              exit 1
            fi
            for attempt in $(seq 1 30); do
              STATUS=$(docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' "$WORKER_CID" 2>/dev/null || echo unknown)
              if [ "$STATUS" = "healthy" ]; then
                break
              fi
              if [ "$attempt" -eq 30 ]; then
                echo "Worker health check failed after waiting for startup (last status: $STATUS)"
                APP_IMAGE="$IMAGE_REF" docker compose ps
                docker logs --tail 100 "$WORKER_CID" || true
                exit 1
              fi
              sleep 2
            done
            APP_IMAGE="$IMAGE_REF" docker compose ps

            # Targeted prune: keep the newest 3 commit-tagged copies of the app
            # image (current deploy + 2 local rollback candidates); GHCR stays
            # the full archive. Dangling layers are always pruned.
            IMAGE_NAME="${IMAGE_REF%:*}"
            KEEP_TAGS=3
            mapfile -t image_rows < <(
              docker images "$IMAGE_NAME" --format '{{.CreatedAt}}|{{.Repository}}:{{.Tag}}' \
                | grep -E ':[0-9a-f]{40}$' \
                | sort -r || true
            )
            for ((i = KEEP_TAGS; i < ${#image_rows[@]}; i++)); do
              OLD_REF="${image_rows[$i]#*|}"
              echo "Pruning old image $OLD_REF"
              docker rmi "$OLD_REF" >/dev/null 2>&1 || true
            done
            docker image prune --force
