x-app-image: &app-image ${APP_IMAGE:-letletme-data:local}
x-logging: &default-logging
  driver: json-file
  options:
    max-size: '20m'
    max-file: '5'

services:
  api:
    image: *app-image
    build:
      context: .
      target: runner
    command: bun dist/index.js
    env_file:
      - path: .env.deploy
        required: false
    environment:
      # Force production even if .env.deploy omits/overrides NODE_ENV — logger
      # must not load pino-pretty (devDependency) in the runtime image.
      - NODE_ENV=production
      - TZ=Asia/Shanghai
    logging: *default-logging
    ports:
      - '127.0.0.1:3000:3000'
    restart: unless-stopped
    healthcheck:
      test:
        [
          'CMD',
          'bun',
          '-e',
          "fetch('http://127.0.0.1:3000/health').then((res) => { if (!res.ok) process.exit(1); }).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  worker:
    image: *app-image
    build:
      context: .
      target: runner
    command: bun dist/worker.js
    env_file:
      - path: .env.deploy
        required: false
    environment:
      - NODE_ENV=production
      - TZ=Asia/Shanghai
    logging: *default-logging
    restart: unless-stopped
    healthcheck:
      # worker.ts touches /tmp/worker-heartbeat every 30s; a stale file means
      # the event loop is hung even though the process still runs. find exits
      # 0 without matches, so assert on non-empty output.
      test: ['CMD-SHELL', 'test -n "$$(find /tmp/worker-heartbeat -mmin -2 2>/dev/null)"']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
