x-app-image: &app-image ${APP_IMAGE:-letletme-data:local}

services:
  api:
    image: *app-image
    build:
      context: .
      target: runner
    command: bun dist/index.js
    env_file: .env.deploy
    environment:
      - TZ=Asia/Shanghai
    ports:
      - "3000:3000"
    volumes:
      - ./log:/app/logs
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "-e",
          "fetch('http://127.0.0.1:3000/health').then((res) => { if (!res.ok) process.exit(1); }).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  worker:
    image: *app-image
    build:
      context: .
      target: runner
    command: bun dist/worker.js
    env_file: .env.deploy
    environment:
      - TZ=Asia/Shanghai
    volumes:
      - ./log:/app/logs
    restart: unless-stopped
